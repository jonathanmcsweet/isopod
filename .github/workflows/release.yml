# .github/workflows/release.yml
#
# Runs after anything lands on master (i.e. a merged PR). The version-bump check
# guarantees ISOPOD_VERSION changed, so: tag v<version>, cut a release, and bump
# the Homebrew tap — all in one job, since a GITHUB_TOKEN tag push won't trigger
# a separate workflow.
name: release

on:
  push:
    branches: [master]

permissions:
  contents: write          # push the tag + create the Release

concurrency: release       # never overlap two releases

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }

      - id: v
        run: echo "version=$(sed -n 's/^ISOPOD_VERSION="\(.*\)"/\1/p' isopod)" >> "$GITHUB_OUTPUT"

      - id: tag
        env: { V: "${{ steps.v.outputs.version }}" }
        run: |
          [ -n "$V" ] || { echo "::error::no ISOPOD_VERSION"; exit 1; }
          if git ls-remote --exit-code --tags origin "refs/tags/v$V" >/dev/null 2>&1; then
            echo "v$V already exists — nothing to release"; echo "new=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$V" -m "isopod $V"
          git push origin "v$V"
          echo "new=true" >> "$GITHUB_OUTPUT"

      - if: steps.tag.outputs.new == 'true'
        env: { GH_TOKEN: "${{ github.token }}", V: "${{ steps.v.outputs.version }}" }
        run: gh release create "v$V" --title "isopod $V" --generate-notes

      # Compute the archive digest ourselves and hand it to the tap-bump action.
      # GitHub generates source archives lazily, so a brand-new tag's tarball can
      # transiently 303-redirect; bump-homebrew-formula-action's own checksum step
      # only accepts a 302 and dies on the 303. curl -L follows any redirect (and
      # retries), and passing download-sha256 makes the action skip that step.
      - id: sha
        if: steps.tag.outputs.new == 'true'
        env: { V: "${{ steps.v.outputs.version }}" }
        run: |
          url="https://github.com/jonathanmcsweet/isopod/archive/refs/tags/v$V.tar.gz"
          sha=$(curl -fsSL --retry 5 --retry-all-errors "$url" | sha256sum | cut -d' ' -f1)
          [ -n "$sha" ] || { echo "::error::failed to compute sha256 for v$V"; exit 1; }
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
      - if: steps.tag.outputs.new == 'true'
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: isopod
          formula-path: Formula/isopod.rb
          homebrew-tap: jonathanmcsweet/homebrew-isopod
          tag-name: v${{ steps.v.outputs.version }}
          download-url: https://github.com/jonathanmcsweet/isopod/archive/refs/tags/v${{ steps.v.outputs.version }}.tar.gz
          download-sha256: ${{ steps.sha.outputs.sha256 }}
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
