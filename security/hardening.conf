# aibox container hardening profile — anti-fingerprinting (Tier 1 + Tier 2)
#
# This is the SINGLE place the box's fingerprint-hardening settings live. The
# `aibox` CLI reads it at `aibox create` time and translates each directive into
# the right `podman`/`docker run` flag (the two engines mask paths differently),
# so you edit settings here instead of editing the bash.
#
# Format: one directive per line; `#` starts a comment; blank lines ignored.
#   runtime <name>        Tier 2 — run the box under a sandboxed OCI runtime
#                         (e.g. runsc = gVisor). Blank = engine default (Tier 2 off).
#   mask <path> [file]    Tier 1 — hide <path> from inside the box. Add the word
#                         `file` if <path> is a single file (docker masks files by
#                         bind-mounting /dev/null; dirs by mounting an empty tmpfs).
#
# Override the runtime without editing this file:  AIBOX_RUNTIME=runsc aibox create ...
# Point at a different profile:                    AIBOX_HARDENING_CONF=/path aibox create ...

# ---------------------------------------------------------------------------
# Tier 2 — sandboxed runtime (OFF by default; see README before enabling).
# gVisor must be installed AND registered with your engine on the HOST first,
# or `aibox create` will fail. Enable by uncommenting the line below.
# ---------------------------------------------------------------------------
# runtime runsc
runtime

# ---------------------------------------------------------------------------
# Tier 1 — paths to mask (works on a shared kernel, no host setup, ON by default)
#
# Each closes a concrete host-fingerprint leak observed from inside a container:
# ---------------------------------------------------------------------------
mask /proc/cmdline file          # host boot args: LUKS UUID, root-fs UUID, ostree hash
mask /proc/modules file          # host kernel modules: VPNs (wireguard), DisplayLink, etc.
mask /sys/class/dmi              # SMBIOS: motherboard/model/BIOS vendor + dates
mask /sys/devices/virtual/dmi    # same DMI data via the devices tree
mask /sys/bus/pci               # full host PCI topology (NVMe, Wi-Fi, USB4 controllers)
mask /sys/bus/usb               # attached peripherals incl. serials (keyboard, mouse, NIC)
mask /sys/class/net             # NIC names + MAC addresses
mask /sys/class/hwmon           # sensor chips (k10temp, amdgpu, nvme) — board signature
mask /sys/class/thermal         # thermal zones
mask /sys/class/drm             # GPU model / vBIOS
mask /sys/block                 # disk models + factory serial numbers (lsblk)
mask /sys/class/nvme            # NVMe controller identity/serials
mask /sys/firmware              # ACPI/DMI firmware tables (usually already masked)

# Deliberately NOT masked — would break common tooling for little gain; see the
# README "What still can't be mitigated" section:
#   /proc/stat     (host btime / boot epoch) — masking breaks top/htop/CPU-usage
#   /proc/cpuinfo  (CPU model/microcode)     — masking breaks build tools, and the
#                                              CPU is still readable via the CPUID
#                                              instruction regardless.
