# isopod container hardening BASELINE — anti-fingerprinting (Tier 1 + Tier 2).
#
# This is the shipped default profile. DO NOT EDIT IT — it is a package file and
# an upgrade (Homebrew, install.sh, etc.) will overwrite your changes.
#
# To customize, create your OWN override file in your config dir. It LAYERS on
# top of this baseline (so you keep masks added in future upgrades) and survives
# upgrades:
#
#     ~/.config/isopod/hardening.conf       (or $ISOPOD_CONFIG_DIR/hardening.conf)
#
# Override directives (same format: one per line; `#` comments; blanks ignored):
#   mask <path> [file]   add a path to mask (append `file` for a single file)
#   unmask <path>        drop one of the baseline masks below
#   runtime <name>       Tier 2 — run the box under a sandboxed OCI runtime
#                        (e.g. runsc = gVisor)
#   no-runtime           force the Tier 2 runtime off
#
# Quick runtime toggle, no file needed:   ISOPOD_RUNTIME=runsc isopod create ...
#
# Example ~/.config/isopod/hardening.conf:
#   runtime runsc           # turn on gVisor
#   unmask /sys/class/net   # let the box see my NIC for this workflow
#
# isopod reads the baseline + your override at `isopod create` time and translates
# each directive into the right podman/docker run flag (the engines mask differently).

# ---------------------------------------------------------------------------
# Tier 2 — sandboxed runtime. OFF by default (no `runtime` line here). gVisor
# must be installed AND registered with your engine on the HOST before enabling,
# or `isopod create` will fail. Enable it from your override file or
# ISOPOD_RUNTIME, not by editing this baseline — see the header.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Tier 1 — paths to mask (works on a shared kernel, no host setup, ON by default)
#
# Each closes a concrete host-fingerprint leak observed from inside a container:
# ---------------------------------------------------------------------------
mask /proc/cmdline file          # host boot args: LUKS UUID, root-fs UUID, ostree hash
mask /proc/modules file          # host kernel modules: VPNs (wireguard), DisplayLink, etc.
mask /sys/class/dmi              # SMBIOS: motherboard/model/BIOS vendor + dates
mask /sys/devices/virtual/dmi    # same DMI data via the devices tree
mask /sys/bus/pci               # full host PCI topology (NVMe, Wi-Fi, USB4 controllers)
mask /sys/bus/usb               # attached peripherals incl. serials (keyboard, mouse, NIC)
mask /sys/class/net             # NIC names + MAC addresses
mask /sys/class/hwmon           # sensor chips (k10temp, amdgpu, nvme) — board signature
mask /sys/class/thermal         # thermal zones
mask /sys/class/drm             # GPU model / vBIOS
mask /sys/block                 # disk models + factory serial numbers (lsblk)
mask /sys/class/nvme            # NVMe controller identity/serials
mask /sys/firmware              # ACPI/DMI firmware tables (usually already masked)

# Deliberately NOT masked — would break common tooling for little gain; see the
# README "What still can't be mitigated" section:
#   /proc/stat     (host btime / boot epoch) — masking breaks top/htop/CPU-usage
#   /proc/cpuinfo  (CPU model/microcode)     — masking breaks build tools, and the
#                                              CPU is still readable via the CPUID
#                                              instruction regardless.
